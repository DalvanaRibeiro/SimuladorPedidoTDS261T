<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuladorPedido</title>
    <link rel="stylesheet" href="style.css"/>
 
</head>
<body>
    <!-- Container principal da página-->
    <div class="container">
        <!-- Título principal-->
        <h1> 🍟 Simulador de Pedido do TDS261T</h1>
        <!-- Subtítulo-->
        <p class="subtitulo">
            Bem-vindo a lacheria do TDS! Aqui você come mais e paga menos 😎🤌
        </p>
        <!-- Área que contém todos os produtos -->
        <div class="cards">
            <!-- CARD = UM PRODUTO-->
            <!-- Usamos label para que clicar no card marque checkbox-->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado -->
                <input type="checkbox" id="hamburguer">
                <!-- Imagem do produto -->
                <img src="Assets/burguer.png" alt="Hambúrguer"> 
                <!-- Nome do produto-->
                <h2> Hambúrguer</h2>
                <!-- Descrição-->
                <p> Pão, carne, queijo, tumate, alface, queijo carne 2</p>
                <!-- Preço-->
                <span> R$ 25,00</span>
            </label>

            <!-- BATATA-->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado -->
                <input type="checkbox" id="batata">
                <!-- Imagem do produto -->
                <img src="Assets/batata.png" alt="batata"> 
                <!-- Nome do produto-->
                <h2> Batata (P)</h2>
                <!-- Descrição-->
                <p> Tão somente batata colhida nos campos celestes..</p>
                <!-- Preço-->
                <span> R$ 12,00</span>
            </label>

            <!-- NUGGETS-->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado -->
                <input type="checkbox" id="nuggets">
                <!-- Imagem do produto -->
                <img src="Assets/nuggets.png" alt="Nuggets"> 
                <!-- Nome do produto-->
                <h2> Nuggets(P)</h2>
                <!-- Descrição-->
                <p> O melhor nuggets semiindustrializado está aqui</p>
                <!-- Preço-->
                <span> R$ 20,00</span>
            </label>

            <!-- COQUINHA-->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado -->
                <input type="checkbox" id="coca">
                <!-- Imagem do produto -->
                <img src="Assets/coquinha.png" alt="coca"> 
                <!-- Nome do produto-->
                <h2> Coca Zero 350 ml</h2>
                <!-- Descrição-->
                <p> Coca zero para dar uma equilibrada.</p>
                <!-- Preço-->
                <span> R$ 6,00</span>
            </label>

            <!-- SORVETE-->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado -->
                <input type="checkbox" id="sorvete">
                <!-- Imagem do produto -->
                <img src="Assets/sorvete.png" alt="sorvete"> 
                <!-- Nome do produto-->
                <h2> Sorvete (P)</h2>
                <!-- Descrição-->
                <p> Sorverte bom</p>
                <!-- Preço-->
                <span> R$ 10,00</span>
            </label>
            <!-- PIZZA -->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado -->
                <input type="checkbox" id="pizza">
                <!-- Imagem do produto -->
                <img src="Assets/pizza.png" alt="pizza"> 
                <!-- Nome do produto-->
                <h2> Pizza(P)</h2>
                <!-- Descrição-->
                <p> Pizza da massa fina</p>
                <!-- Preço-->
                <span> R$ 15,00</span>
            </label>          

        
        </div>
        <!-- Botão que chama a função calcular() para somar o pedido-->
        <button onclick="calcular()"> Calcular Pedido</button>
        <!-- Área de resultado do pedido-->
        <div id="resultado" class="resultado"></div>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
